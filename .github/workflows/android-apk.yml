name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - cursor/zero-risk-receipt-rendering
    paths:
      - "android-template/**"
      - ".github/workflows/android-apk.yml"

jobs:
  build-apk:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: android-template

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Gradle
        run: sudo apt-get update && sudo apt-get install -y gradle

      - name: Build debug APK
        run: gradle clean assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: easypaisa-webview-debug-apk
          path: android-template/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 7
